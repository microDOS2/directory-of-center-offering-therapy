        let currentFilter = 'all';
        let currentCity = '';

        function init() {
            renderCenters(centers);
            populateCityFilter();
        }

        function renderCenters(data) {
            const grid = document.getElementById('centersGrid');
            const noResults = document.getElementById('noResults');
            grid.innerHTML = '';

            if (data.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            data.forEach(center => {
                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl p-6 shadow-sm card-hover border border-stone-200 relative ${center.license && center.license.includes('First') ? 'ring-2 ring-nature-500 ring-offset-2' : ''}`;
                
                const stateColor = center.state === 'colorado' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800';
                const stateLabel = center.state === 'colorado' ? 'Colorado' : 'Oregon';
                
                card.innerHTML = `
                    ${center.license && center.license.includes('First') ? `<div class="absolute top-0 right-0 bg-nature-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">FIRST LICENSED</div>` : ''}
                    
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${stateColor}">
                                    ${stateLabel}
                                </span>
                                ${center.type ? `<span class="text-xs text-stone-500 font-medium">${center.type}</span>` : ''}
                            </div>
                            <h3 class="font-bold text-xl text-stone-900 leading-tight">${center.name}</h3>
                            <p class="text-stone-600 font-medium">${center.city}${center.contact ? ' • ' + center.contact : ''}</p>
                        </div>
                    </div>
                    
                    <div class="space-y-3 mb-4 bg-stone-50 p-4 rounded-xl border border-stone-100">
                        <div class="flex items-start text-sm">
                            <i class="fas fa-map-marker-alt w-5 text-nature-600 mt-0.5"></i>
                            <span class="text-stone-700 font-medium">${center.address || 'Address not listed'}</span>
                        </div>
                        
                        ${center.phone ? `
                        <div class="flex items-center text-sm">
                            <i class="fas fa-phone w-5 text-nature-600"></i>
                            <a href="tel:${center.phone.replace(/[^0-9]/g, '')}" class="text-stone-700 hover:text-nature-700 font-medium">${center.phone}</a>
                        </div>` : '<div class="flex items-center text-sm"><i class="fas fa-phone w-5 text-stone-400"></i><span class="text-stone-400 italic">Phone not listed</span></div>'}
                        
                        ${center.email ? `
                        <div class="flex items-center text-sm">
                            <i class="fas fa-envelope w-5 text-nature-600"></i>
                            <a href="mailto:${center.email}" class="text-stone-700 hover:text-nature-700 font-medium truncate">${center.email}</a>
                        </div>` : ''}
                        
                        ${center.license && !center.license.includes('First') ? `
                        <div class="flex items-center text-sm">
                            <i class="fas fa-certificate w-5 text-mushroom-600"></i>
                            <span class="text-stone-600 text-xs">License: ${center.license}</span>
                        </div>` : ''}
                    </div>

                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm font-semibold text-stone-900">Pricing:</span>
                            <span class="text-sm font-bold text-nature-700">${center.cost}</span>
                        </div>
                        <p class="text-sm text-stone-600 leading-relaxed bg-white p-3 rounded-lg border border-stone-200">${center.notes}</p>
                    </div>

                    ${center.website ? `
                    <a href="${center.website}" target="_blank" class="block w-full text-center bg-nature-600 hover:bg-nature-700 text-white font-medium py-3 rounded-xl transition shadow-sm hover:shadow-md">
                        Visit Official Website <i class="fas fa-external-link-alt ml-2 text-xs"></i>
                    </a>` : '<div class="text-center py-3 text-stone-400 text-sm italic bg-stone-100 rounded-xl">No website listed</div>'}
                `;
                grid.appendChild(card);
            });
        }

        function populateCityFilter() {
            const cities = [...new Set(centers.map(c => c.city))].sort();
            const select = document.getElementById('cityFilter');
            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                select.appendChild(option);
            });
        }

        function filterState(state) {
            currentFilter = state;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('filter-active', 'bg-nature-600', 'text-white');
                btn.classList.add('hover:bg-stone-100');
            });
            const activeBtn = document.getElementById(`filter-${state}`);
            activeBtn.classList.add('filter-active', 'bg-nature-600', 'text-white');
            activeBtn.classList.remove('hover:bg-stone-100');
            applyFilters();
        }

        function filterCity(city) {
            currentCity = city;
            applyFilters();
        }

        function applyFilters() {
            let filtered = centers;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(c => c.state === currentFilter);
            }
            
            if (currentCity) {
                filtered = filtered.filter(c => c.city === currentCity);
            }
            
            renderCenters(filtered);
        }

        function handleSearch(query) {
            if (!query) {
                applyFilters();
                return;
            }
            
            const lower = query.toLowerCase();
            const filtered = centers.filter(c => 
                c.name.toLowerCase().includes(lower) ||
                c.city.toLowerCase().includes(lower) ||
                (c.address && c.address.toLowerCase().includes(lower)) ||
                (c.notes && c.notes.toLowerCase().includes(lower))
            );
            
            renderCenters(filtered);
        }

        function resetFilters() {
            currentFilter = 'all';
            currentCity = '';
            document.getElementById('cityFilter').value = '';
            document.getElementById('heroSearch').value = '';
            filterState('all');
        }

        // Initialize
        init();
    </script>
